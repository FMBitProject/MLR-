services:
  mlr-flow:
    build: ./app
    ports:
      - "3000:3000"
    environment:
      # Ganti dengan secret acak Anda sendiri di produksi:
      #   openssl rand -hex 32
      AUTH_SECRET: ${AUTH_SECRET:-mlr-demo-secret-change-in-production}
      # Opsional — isi salah satu untuk mengaktifkan penilaian AI.
      # GROQ_API_KEY gratis (console.groq.com); provider terdeteksi otomatis.
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      XAI_API_KEY: ${XAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-}
    volumes:
      # Database SQLite + file upload bertahan di volume ini
      - mlr-data:/app/.data
    restart: unless-stopped

volumes:
  mlr-data:
